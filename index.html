<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2 Pairs Step Sequencer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>2 Pairs Step Sequencer</h2>

<div id="app">
  <div id="left">
    <button id="playBtn" class="button ctl-btn">Start</button>
    <button id="mixerBtn" class="button ctl-btn">Mixer</button>
    <button id="sequenceBtn" class="button ctl-btn">Sequence</button>

    <br><br>

    <span class="seq-title seq1">Sequence1</span>
    <input id="patternName1" type="text" placeholder="pattern name">
    <button id="saveBtn1" class="button seq1">Save</button>
    <button id="clrBtn1" class="button seq1">Clear</button>
    <div id="sequencer1"></div>

    <br>

    <span class="seq-title seq2">Sequence2</span>
    <input id="patternName2" type="text" placeholder="pattern name">
    <button id="saveBtn2" class="button seq2">Save</button>
    <button id="clrBtn2" class="button seq2">Clear</button>
    <div id="sequencer2"></div>
  </div>

  <div id="right">
    <h4 class="ptn">Pattern</h4>
    <input id="patternSearch" type="text" placeholder="search pattern..." />
    <ul id="patternList"></ul>
    <br>
    <button class="button" onclick="exportAllPatterns()">Export All</button>
    <label class="button">
      Import
      <input type="file" class="hidden" onchange="importPatterns(this.files[0])">
    </label>
    <span id="fileName">No file</span>
    <br><br>
    <h4 class="snd">Sound</h4>
    <button class="button soundSetting">HiHat</button>
    <button class="button soundSetting">Snare</button>
    <button class="button soundSetting">Kick</button>
    <button class="button soundSetting">Noise</button>
    <button class="button soundSetting">Crystal</button>
    <br>
    <button class="button soundSetting">Brush</button>
  </div>
</div>

<div id="stepPopup" class="popup hidden">
  <div class="popup-content">
    <h3 id="popTitle"></h3>
    <div id="subTitle"></div>
    <br>
    <div id="stepControl"></div>
    <div id="stepSliders"></div>
  </div>
</div>

<div id="mixerPopup" class="popup hidden">
  <div class="popup-content">
    <h3>Mixer</h3>
    <div id="mixerSliders">
      <div class="mixer-channel">
        <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume(0, this.value)">
        <span class="seq-title seq1">Sequence1</span>
      </div>
      <div class="mixer-channel">
        <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume(1, this.value)">
        <span class="seq-title seq2">Sequence2</h3>
      </div>
    </div>
    <div>
      <input class="mixer-balance" type="range" min="0" max="1" step="0.01" value="0.5" oninput="setBalance(this.value)">
    </div>
  </div>
</div>

<script src="script/noise.js"></script>
<script src="script/sequenceP.js"></script>
<script src="script/sequenceUI.js"></script>
<script src="script/sequencer.js"></script>
<script src="script/patternUI.js"></script>
<script src="script/pattern.js"></script>
<script src="script/soundUI.js"></script>
<script src="script/sound.js"></script>
<script src="script/mixer.js"></script>
<script src="script/velocity.js"></script>
<script src="script/main.js"></script>
</body>
</html>
