<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Step Sequencer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>Step Sequencer</h2>

<div id="app">
  <div id="left">
    <button onclick="start()">Start</button>
    <button onclick="stop()">Stop</button>

    <br>
    <h3>Sequence1</h3>
    <div id="sequencer0"></div>
    <input id="patternName0" placeholder="pattern name">
    <button onclick="savePattern0()">Save</button>
    <button onclick="clearPattern0()">Clear</button>

    <br>

    <h3>Sequence2</h3>
    <div id="sequencer1"></div>
    <input id="patternName1" placeholder="pattern name">
    <button onclick="savePattern1()">Save</button>
    <button onclick="clearPattern1()">Clear</button>
  </div>

  <div id="right">
    <h3>Pattern</h3>
    <ul id="patternList"></ul>
  </div>

</div>

<script src="script/inst.js"></script>
<script src="script/sequenceUI.js"></script>
<script src="script/sequencer.js"></script>
<script src="script/pattern.js"></script>
<script src="script/main.js"></script>
</body>
</html>
